<head>
	<link href="http://gmpg.org/xfn/11" rel="profile">
	<meta http-equiv="content-type" content="text/html; charset=utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">{% if page.article %}
	<link rel="canonical" href="{{ site.url }}{{ page.url }}" />
	<meta name="description"
		content="{% if page.quote %}{{ page.quote }}{% else %}{{ page.content | strip_html | truncatewords: 20 }}{% endif %}" />
	<meta property="og:description"
		content="{% if page.quote %}{{ page.quote }}{% else %}{{ page.content | strip_html | truncatewords: 20 }}{% endif %}" />
	<meta itemprop="image"
		content="{% if page.image %}{{ site.url }}{{ page.image }}{% else %}{{ site.url }}{{ site.icon }}{% endif %}" />
	<meta property="og:image"
		content="{% if page.image %}{{ site.url }}{{ page.image }}{% else %}{{ site.url }}{{ site.icon }}{% endif %}" />
	<meta property="og:title" content="{{ page.title }}" />
	<meta property="og:type" content="article" />
	<meta property="og:url" content="{{ site.url }}{{ page.url }}" />
	<meta property="og:site_name" content="{{ site.title }}" />{% endif %}
	<title>{% if page.title == "Home" %}{{ site.title }} &middot; {{ site.tagline }}{% else %}{{ page.title }} &middot; {{
		site.title }}{% endif %}</title>
	<link href="/assets/css/default.css" type="text/css" rel="stylesheet" />
	<link href="/assets/css/genericons.css" type="text/css" rel="stylesheet" />
	<link href="/assets/css/syntax.css" type="text/css" rel="stylesheet" />
	<link href="/assets/css/mobile.css" type="text/css" rel="stylesheet" />
	<link rel="stylesheet" href="http://fonts.googleapis.com/css?family=PT+Serif:400,400italic,700|PT+Sans:400">
	<link rel="apple-touch-icon" href="{{ site.url }}{{ site.icon }}">
	<link rel="shortcut icon" href="{{ site.url }}/assets/images/favicon.ico">
	<link rel="alternate" type="application/rss+xml" title="RSS" href="{{ site.url }}/atom.xml">
	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap">
	<script src="/assets/js/smooth-scroll.js"></script>
	<script src="/assets/js/menu-toggle.js"></script>
	<script>
		$('iframe').each(function () {
			var url = $(this).attr("src");
			if ($(this).attr("src").indexOf("?") > 0) {
				$(this).attr({
					"src": url + "&wmode=transparent",
					"wmode": "Opaque"
				});
			}
			else {
				$(this).attr({
					"src": url + "?wmode=transparent",
					"wmode": "Opaque"
				});
			}
		});
	</script>
</head>
