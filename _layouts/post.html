---
layout: default
article: true
---

<header class="clean" style="height: 100%;">
	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap">
	<div id="post-info">
		<h1>{{ page.title }}</h1>

		{% if page.image %}
		<img class="hero" src="{{ page.image }}" />
		{% endif %}

		{% if page.quote %}
		<h2>{{ page.quote }}</h2>
		{% endif %}

		<a class="site-title" href="{{ site.url }}"><img src="{{ site.icon }}" class="site-icon-small">{{ site.title }}</a>

		<br />
		<h3 style="text-align: right;"><a href="{{ site.url }}">Home</a></h3>
	</div>
</header>
<div class="content">
	{{ content }}
</div>
